<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎓 EDUC Jogos Educacionais II</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #1e3a5f;
    --navy2:  #15294a;
    --teal:   #0ea5e9;
    --amber:  #f59e0b;
    --cream:  #fef9f0;
    --white:  #ffffff;
    --text:   #1e293b;
    --muted:  #64748b;
    --border: #e2e8f0;
    --shadow: 0 4px 24px rgba(30,58,95,0.10);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

  /* ── HERO ─────────────────────────────────── */
  .hero {
    background: linear-gradient(135deg, var(--navy2) 0%, var(--navy) 55%, #1a3d6e 100%);
    padding: 40px 20px 60px;
    text-align: center;
    color: white;
  }
  .hero h1 { font-family:'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 15px; }
  .hero h1 em { color: var(--amber); font-style: normal; }

  .back-btn {
    display: inline-block; margin-top: 20px; padding: 10px 20px;
    background: rgba(255,255,255,0.1); border: 1px solid var(--amber);
    color: var(--amber); text-decoration: none; border-radius: 30px; font-weight: 800;
  }

  /* ── MENU DE CATEGORIAS (AJUSTADO PARA ROLAGEM) ── */
  .tabs-container {
    padding: 20px 0;
    background: var(--cream);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tabs-wrap {
    display: flex;
    overflow-x: auto; /* Habilita rolagem horizontal */
    overflow-y: hidden;
    padding: 5px 20px 15px 20px;
    gap: 10px;
    -webkit-overflow-scrolling: touch; /* Rolagem suave no iOS */
    scrollbar-width: thin; /* Barra fina no Firefox */
  }

  /* Estilização da barra de rolagem para Chrome/Edge/Safari */
  .tabs-wrap::-webkit-scrollbar {
    height: 4px;
  }
  .tabs-wrap::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
  }

  .tab {
    flex: 0 0 auto; /* Impede as abas de encolherem, forçando a rolagem */
    padding: 10px 20px;
    border-radius: 40px;
    border: 2px solid var(--border);
    background: var(--white);
    color: var(--muted);
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap; /* Impede quebra de texto dentro da aba */
  }

  .tab.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
    box-shadow: 0 4px 12px rgba(30,58,95,0.2);
  }

  /* ── GRID E CARDS ─────────────────────────── */
  .main { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
  
  .search-bar {
    margin: 20px 0;
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
  }
  .search-bar input { border: none; outline: none; width: 100%; font-size: 1rem; }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  /* Ajuste Tablet/Mobile */
  @media (max-width: 768px) {
    .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    .hero h1 { font-size: 1.8rem; }
    .card-body { padding: 12px; }
    .card-title { font-size: 0.9rem; }
  }

  .game-card {
    background: #fff; border-radius: 15px; overflow: hidden;
    text-decoration: none; display: flex; flex-direction: column;
    box-shadow: var(--shadow); transition: transform 0.2s;
    border: 2px solid transparent;
  }
  .game-card:hover { transform: translateY(-5px); }

  .card-thumb { height: 120px; display: flex; align-items: center; justify-content: center; position: relative; }
  .big-emoji { font-size: 3rem; }
  .card-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
  .card-title { font-weight: 900; color: var(--navy); margin-bottom: 5px; }
  .card-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; flex: 1; }
  
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .card-btn { background: var(--navy); color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; }

  footer { text-align: center; padding: 40px; background: var(--navy2); color: white; font-size: 0.8rem; margin-top: 40px; }
</style>
</head>
<body>
<body>
  <!-- COLE O CÓDIGO DO VLIBRAS AQUI -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

  <!-- O resto do seu código continua aqui (overlay-aviso, etc) -->

<header class="hero">
  <h1>EDUC Games <em>Volume II</em></h1>
  <p>Explore novos desafios educacionais!</p>
  <a class="back-btn" href="https://alvesdealmeida.github.io/educMenu1/">← Menu Anterior</a>
</header>

<main class="main">
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Pesquisar jogo..." oninput="filterGames()">
  </div>

  <div class="tabs-container">
    <div class="tabs-wrap" id="tabs">
      <!-- Gerado via JS -->
    </div>
  </div>

  <div class="games-grid" id="gamesGrid">
    <!-- Gerado via JS -->
  </div>
</main>

<footer>
  Desenvolvido com 💙 para a <strong>educação</strong> &nbsp;·&nbsp;
  Todos os jogos são gratuitos e de uso educacional.
  Desenvolvido pelo <strong>Professor Sebastião Alves de Almeida.</strong>
  <br><br>
  <a href="http://lattes.cnpq.br/9094218444915879" target="_blank" rel="noopener" 
     style="color: var(--teal); text-decoration: none; font-size: 0.9rem; border: 1px solid var(--teal); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-top: 10px; transition: all 0.3s;">
     📄 Visualizar Currículo Lattes
  </a>
</footer>

<script>
const SUBJECT_STYLES = {
  "MULTIDICIPLINAR": { grad:"#0ea5e9", btn:"#0ea5e9", icon:"🌍" },
  "LÓGICA": { grad:"#8b5cf6", btn:"#8b5cf6", icon:"🧩" },
  "MATEMATICA": { grad:"#10b981", btn:"#10b981", icon:"📐" },
  "PORTUGUÊS": { grad:"#f97316", btn:"#f97316", icon:"📖" },
  "ROBÓTICA": { grad:"#f43f5e", btn:"#f43f5e", icon:"🤖" },
  "GEOGRAFIA": { grad:"#2d6a4f", btn:"#2d6a4f", icon:"🗺️" },
  "HISTÓRIA": { grad:"#99582a", btn:"#99582a", icon:"🏺" },
  "PROGRAMAÇÃO": { grad:"#1e293b", btn:"#1e293b", icon:"💻" },
  "TECNOLOGIA": {grad:"#050505", btn:"#22c55e", icon:"🚀"},
};

const games = [
  { title: "EducVerse 3D", desc: "Mundo interativo.", emoji: "🌍", category: "MULTIDICIPLINAR", url: "https://alvesdealmeida.github.io/eduVerse-3D/" },
  { title: "Cubo Mágico [[VERSÃO BETA]]", desc: "Lógica e raciocínio.", emoji: "🧩", category: "LÓGICA", url: "https://alvesdealmeida.github.io/cuboMagicoEduc/" },
  { title: "Missão Amazônia: Pro Trainer [[VERSÃO BETA]]", desc:"Treine navegação lógica e ângulos no rio.", emoji:"🚤", category: "LÓGICA", url: "https://alvesdealmeida.github.io/navegAmazonia/"},
  { title: "MatemagicaKids", desc: "Aprenda tabuada.", emoji: "✖️", category: "MATEMATICA", url: "https://alvesdealmeida.github.io/tabuadaKids/" },
  { title: "Tipos de Textos", desc: "Gramática divertida.", emoji: "📚", category: "PORTUGUÊS", url: "https://alvesdealmeida.github.io/cidadedasPalavras/" },
  { title: "MostraBot", desc: "Robótica educacional.", emoji: "🤖", category: "ROBÓTICA", url: "https://alvesdealmeida.github.io/mostraBot/" },
  { title: "Código Binário", desc: "Introdução à programação.", emoji: "💻", category: "PROGRAMAÇÃO", url: "https://alvesdealmeida.github.io/joguinhoBinario_t/" },
  { title: "Navegação Amazônia - [[VERSÃO BETA]]", desc: "Pilote entre comunidades e evite obstáculos.", emoji: "🌳", category: "GEOGRAFIA", url: "https://alvesdealmeida.github.io/navegAmazonia/" },
  { title: "História de Araruama", desc: "História Local [Araruama].", emoji: "🏺", category: "HISTÓRIA", url: "https://alvesdealmeida.github.io/histAraruama/" },

  { title: "Expedição a Araruama", desc: "História Local [Araruama].", emoji: "🌊", category: "HISTÓRIA", url: "https://alvesdealmeida.github.io/codigoMorseAraruama/" },
  { title: "Mestre da Tech - [[**VERSÃO BETA**]]", desc: "Teste seus conhecimentos sobre Hardware, Software e a História da Internet.", emoji: "🚀", category: "TECNOLOGIA", url: "https://alvesdealmeida.github.io/quizTecnologia/" },
];

let activeCategory = "Todos";

function renderTabs() {
  const categories = ["Todos", ...new Set(games.map(g => g.category))];
  const tabsElement = document.getElementById("tabs");
  
  tabsElement.innerHTML = categories.map(cat => `
    <button class="tab ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">
      ${cat}
    </button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  filterGames();
}

function filterGames() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = games.filter(g => {
    const matchCat = activeCategory === "Todos" || g.category === activeCategory;
    const matchQ = g.title.toLowerCase().includes(q) || g.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderGames(filtered);
}

function renderGames(list) {
  const grid = document.getElementById("gamesGrid");
  grid.innerHTML = list.map(g => {
    const s = SUBJECT_STYLES[g.category] || { grad: "#ccc", btn: "#333", icon: "🎮" };
    return `
    <a class="game-card" href="${g.url}" target="_blank" style="--accent:${s.btn}">
      <div class="card-thumb" style="background-color:${s.grad}22">
        <span class="big-emoji">${g.emoji}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="card-footer">
          <small style="color:${s.btn}; font-weight:800">${s.icon} ${g.category}</small>
          <button class="card-btn" style="background:${s.btn}">Jogar</button>
        </div>
      </div>
    </a>`;
  }).join('');
}

// Inicialização
renderTabs();
filterGames();
</script>
<div style="text-align: center; margin-top: 20px;">
    <!-- Contador Simplificado -->
    <img width="100" src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https://alvesdealmeida.github.io/educMenu2/&count_bg=%2379C83D&title_bg=%23555555&title=Acessos" alt="Contador de Visitas">
</div>
</body>
</html>
